# jqwik configuration
#
# Although the property-based tests in this module drive the iteration loop
# themselves (so the suite runs under JUnit Jupiter + Spring's @DataJpaTest),
# these defaults still apply to any future @Property tests run by jqwik's own
# engine, and they give deterministic, minimized counter-examples on failure.
database = .jqwik-database
defaultTries = 100
defaultMaxDiscardRatio = 5
defaultAfterFailure = PREVIOUS_SEED
defaultShrinking = BOUNDED
