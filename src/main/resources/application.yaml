football-data:
  api:
    base-url: https://api.football-data.org
    key: ${FOOTBALL_DATA_API_KEY:demo-key}
    competition-id: 2000
    connection-timeout: 10000
    read-timeout: 30000

spring:
  application:
    name: WorldCupBetBackend
  profiles:
    default: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: WorldCupBetHikariPool
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
