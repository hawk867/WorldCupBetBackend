app:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-for-development-only-change-in-production}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

football-data:
  api:
    base-url: https://api.football-data.org
    key: ${FOOTBALL_DATA_API_KEY:demo-key}
    competition-id: 2000
    connection-timeout: 10s
    read-timeout: 30s
    rate-limit: 10
    max-retries: 3
  seed:
    on-startup: false

spring:
  application:
    name: WorldCupBetBackend
  profiles:
    default: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: WorldCupBetHikariPool
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
